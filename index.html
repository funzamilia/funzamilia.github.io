<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StikkySpot</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #F5E6D3;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    @keyframes spin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }
    
    .hexagon {
      width: 180px;
      height: 180px;
      display: flex;
      justify-content: center;
      align-items: center;
      animation: spin 20s linear infinite;
    }

    .hexagon svg {
      width: 100%;
      height: 100%;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
    }

    .hexagon:hover {
      animation-play-state: paused;
    }

    .hexagon svg:hover {
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <div class="hexagon" title="Funzamilia">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <polygon 
        points="50,15 80.31,32.5 80.31,67.5 50,85 19.69,67.5 19.69,32.5" 
        fill="#111111" 
        stroke="#111111" 
        stroke-width="12" 
        stroke-linejoin="round" 
      />
    </svg>
  </div>
</body>
</html>
